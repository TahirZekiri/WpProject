<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | TextClassifier</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 3rem 0;
        }

        .error-icon {
            font-size: 4rem;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navigation :: navbar}"></div>

<div class="hero">
    <div class="container text-center">
        <h1 class="display-5 fw-bold mb-2">
            <i class="bi bi-shield-lock me-2"></i>Access Denied
        </h1>
        <p class="lead mb-0 opacity-75">
            You do not have permission to access this page.
        </p>
    </div>
</div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-lg-5 text-center">

                    <div class="mb-4">
                        <i class="bi bi-lock-fill text-danger error-icon"></i>
                    </div>

                    <h5 class="card-title mb-3">
                        Restricted Area
                    </h5>

                    <p class="text-muted mb-4">
                        This page is only available to users with the required permissions.
                    </p>

                    <div class="d-flex justify-content-center flex-wrap gap-2">
                        <a th:href="@{/}" class="btn btn-primary">
                            <i class="bi bi-house-door me-1"></i>
                            Go Home
                        </a>

                        <a th:href="@{/entries}" class="btn btn-outline-secondary">
                            <i class="bi bi-list-ul me-1"></i>
                            View Entries
                        </a>

                        <a href="javascript:history.back()" class="btn btn-outline-dark">
                            <i class="bi bi-arrow-left me-1"></i>
                            Go Back
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
