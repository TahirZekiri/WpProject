<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Entries - TextClassifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1 fw-bold">
                <i class="bi bi-list-ul me-2"></i>All Text Entries
            </h2>
            <p class="text-muted mb-0"
               th:text="${entries.size() + ' entr' + (entries.size() == 1 ? 'y' : 'ies') + ' collected'}"></p>
        </div>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>New Entry
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${entries.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox display-3 d-block mb-3 opacity-50"></i>
        <h5>No entries yet</h5>
        <p class="mb-4">Go back to the home page to classify your first text.</p>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-house me-1"></i>Go Home
        </a>
    </div>

    <!-- Entries table -->
    <div th:if="${!entries.isEmpty()}" class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Content</th>
                            <th>Type</th>
                            <th>Tone</th>
                            <th>Format</th>
                            <th>Date</th>
                            <th class="pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="entry, stat : ${entries}">
                            <td class="ps-4 text-muted" th:text="${stat.index + 1}"></td>
                            <td style="max-width: 320px;">
                                <span class="d-inline-block text-truncate fw-medium"
                                      style="max-width: 300px;"
                                      th:text="${entry.content}"
                                      th:title="${entry.content}"></span>
                            </td>
                            <td>
                                <span class="badge bg-primary"
                                      th:text="${entry.textType.displayName}"></span>
                            </td>
                            <td>
                                <span class="badge bg-success"
                                      th:text="${entry.textTone.displayName}"></span>
                            </td>
                            <td>
                                <span class="badge bg-warning text-dark"
                                      th:text="${entry.textFormat.displayName}"></span>
                            </td>
                            <td class="text-muted text-nowrap"
                                th:text="${#temporals.format(entry.createdAt, 'dd MMM yyyy, HH:mm')}"></td>
                            <td class="pe-4">
                                <form th:action="@{/entries/delete/{id}(id=${entry.id})}" method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this entry?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger"
                                            title="Delete entry">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
