<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Entries - TextClassifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        tbody tr {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-1 fw-bold">
                <i class="bi bi-list-ul me-2"></i>All Text Entries
            </h2>
            <p class="text-muted mb-0"
               th:text="${page.totalElements + ' entr' + (page.totalElements == 1 ? 'y' : 'ies') + ' collected'}"></p>
        </div>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>New Entry
        </a>
    </div>

    <!-- Filters  -->
    <div class="card shadow-sm border-0 mb-4" th:if="${!page.isEmpty()}">
        <div class="card-body p-4">
            <form method="get" th:action="@{/entries}" class="row g-3 align-items-end">

                <input type="hidden" name="page" value="1">
                <input type="hidden" name="pageSize" th:value="${page.size}">

                <div class="col-md-2">
                    <label for="id" class="form-label fw-semibold">Entry ID</label>
                    <input type="number"
                           class="form-control"
                           id="id"
                           name="id"
                           placeholder="ID"
                           th:value="${filterDto.id}">
                </div>

                <div class="col-md-3">
                    <label for="textType" class="form-label fw-semibold">Text Type</label>
                    <select id="textType" name="textType" class="form-select">
                        <option value="">All Types</option>

                        <option th:each="type : ${types}"
                                th:value="${type}"
                                th:text="${type.displayName}"
                                th:selected="${filterDto.textType == type}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="textTone" class="form-label fw-semibold">Text Tone</label>
                    <select id="textTone" name="textTone" class="form-select">
                        <option value="">All Tones</option>

                        <option th:each="tone : ${tones}"
                                th:value="${tone}"
                                th:text="${tone.displayName}"
                                th:selected="${filterDto.textTone == tone}">
                        </option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="sortBy" class="form-label fw-semibold">Sort By</label>
                    <select id="sortBy" name="sortBy" class="form-select">
                        <option value="id" th:selected="${filterDto.sortBy == 'id'}">ID</option>
                        <option value="createdAt" th:selected="${filterDto.sortBy == 'createdAt'}">Created At</option>
                        <option value="textType" th:selected="${filterDto.sortBy == 'textType'}">Text Type</option>
                        <option value="textTone" th:selected="${filterDto.sortBy == 'textTone'}">Text Tone</option>
                    </select>
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-funnel me-1"></i>Apply
                    </button>
                </div>

            </form>
        </div>
    </div>


    <!-- Empty state -->
    <div th:if="${page.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-inbox display-3 d-block mb-3 opacity-50"></i>
        <h5>No entries yet</h5>
        <p class="mb-4">Go back to the home page to classify your first text.</p>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-house me-1"></i>Go Home
        </a>
    </div>

    <!-- Entries table -->
    <div th:if="${!page.isEmpty()}" class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Content</th>
                        <th sec:authorize="hasRole('ADMINISTRATOR')">Created By</th>
                        <th>Type</th>
                        <th>Tone</th>
                        <th>Labels</th>
                        <th>Entities</th>
                        <th class="pe-4">Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="entry, stat : ${page.content}"
                        th:data-href="@{/entries/{id}(id=${entry.id})}">
                        <td class="ps-4 text-muted" th:text="${stat.index + 1}"></td>
                        <td style="max-width: 320px;">
                                <span class="d-inline-block text-truncate fw-medium"
                                      style="max-width: 300px;"
                                      th:text="${entry.content}"
                                      th:title="${entry.content}"></span>
                        </td>
                        <!--USER-->
                        <td sec:authorize="hasRole('ADMINISTRATOR')">
                            <span class="badge bg-dark">
                                <i class="bi bi-person-circle me-1"></i>
                                <span th:text="${entry.user.username}"></span>
                            </span>
                        </td>
                        <td>
                                <span class="badge bg-primary"
                                      th:text="${entry.textType.displayName}"></span>
                        </td>
                        <td>
                                <span class="badge bg-success"
                                      th:text="${entry.textTone.displayName}"></span>
                        </td>
                        <td>
                            <span th:if="${entry.labels.isEmpty()}" class="text-muted small">—</span>
                            <div class="d-flex flex-wrap gap-1">
                                    <span th:each="label : ${entry.labels}"
                                          class="badge bg-secondary"
                                          th:text="${label.name}"></span>
                            </div>
                        </td>
                        <td>
                            <span th:if="${entry.entities.isEmpty()}" class="text-muted small">—</span>
                            <div class="d-flex flex-wrap gap-1">
                                    <span th:each="entity : ${entry.entities}"
                                          class="badge bg-info text-dark"
                                          th:text="${entity.name}"></span>
                            </div>
                        </td>
                        <td class="pe-4 text-muted text-nowrap"
                            th:text="${#temporals.format(entry.createdAt, 'dd MMM yyyy, HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-4" th:if="${!page.isEmpty()}">
        <div th:include="fragments/paging :: pageSection(${page})"></div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('tbody tr[data-href]').forEach(row => {
        row.addEventListener('click', () => window.location = row.dataset.href);
    });
</script>
</body>
</html>
