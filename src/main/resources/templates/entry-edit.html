<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${'Edit Entry #' + entry.id + ' - TextClassifier'}">Edit Entry</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .section-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; margin-bottom: 0.5rem; }
        .btn-check:checked + .btn-outline-primary { background-color: #0d6efd; color: white; }
        .btn-check:checked + .btn-outline-success  { background-color: #198754; color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Back bar -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a th:href="@{/entries/{id}(id=${entry.id})}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Back to Entry
                </a>
                <span class="text-muted small">
                    <i class="bi bi-pencil me-1"></i>Editing entry
                    <strong th:text="${'#' + entry.id}"></strong>
                </span>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-lg-5">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-pencil-square me-2 text-primary"></i>Edit Entry
                    </h5>

                    <form th:action="@{/entries/{id}/edit(id=${entry.id})}" method="post">

                        <!-- Text content -->
                        <div class="mb-4">
                            <label for="content" class="form-label fw-semibold">Text Content</label>
                            <textarea class="form-control" id="content" name="content" rows="6"
                                      required th:text="${entry.content}"></textarea>
                        </div>

                        <!-- Text Type -->
                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-tag me-1"></i>Type
                            </div>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="type : ${textTypes}" class="d-inline-flex">
                                    <input type="radio" class="btn-check" name="textType"
                                           th:id="${'type_' + type.name()}"
                                           th:value="${type.name()}"
                                           th:checked="${entry.textType == type}"
                                           required autocomplete="off">
                                    <label class="btn btn-outline-primary btn-sm"
                                           th:for="${'type_' + type.name()}"
                                           th:text="${type.displayName}"></label>
                                </div>
                            </div>
                        </div>

                        <!-- Tone -->
                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-emoji-smile me-1"></i>Tone
                            </div>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="tone : ${textTones}" class="d-inline-flex">
                                    <input type="radio" class="btn-check" name="textTone"
                                           th:id="${'tone_' + tone.name()}"
                                           th:value="${tone.name()}"
                                           th:checked="${entry.textTone == tone}"
                                           required autocomplete="off">
                                    <label class="btn btn-outline-success btn-sm"
                                           th:for="${'tone_' + tone.name()}"
                                           th:text="${tone.displayName}"></label>
                                </div>
                            </div>
                        </div>

                        <!-- Custom Labels -->
                        <div class="mb-4">
                            <div class="section-label d-flex align-items-center gap-2">
                                <span><i class="bi bi-bookmark me-1"></i>Labels</span>
                                <button type="button" class="btn btn-sm btn-outline-secondary p-0 px-1 lh-1"
                                        data-bs-toggle="modal" data-bs-target="#addLabelModal"
                                        title="Add new label">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                            <div class="d-flex flex-wrap gap-2" id="labelsContainer">
                                <div th:each="label : ${customLabels}" class="d-inline-flex">
                                    <input type="checkbox" class="btn-check" name="labelIds"
                                           th:id="${'label_' + label.id}"
                                           th:value="${label.id}"
                                           th:checked="${entry.labels.contains(label)}"
                                           autocomplete="off">
                                    <label class="btn btn-outline-secondary btn-sm"
                                           th:for="${'label_' + label.id}"
                                           th:text="${label.name}"></label>
                                </div>
                                <span th:if="${customLabels.isEmpty()}" class="text-muted small fst-italic">
                                    No labels yet — click <i class="bi bi-plus-lg"></i> to create one.
                                </span>
                            </div>
                        </div>

                        <!-- Custom Entities -->
                        <div class="mb-4">
                            <div class="section-label d-flex align-items-center gap-2">
                                <span><i class="bi bi-building me-1"></i>Entities</span>
                                <button type="button" class="btn btn-sm btn-outline-secondary p-0 px-1 lh-1"
                                        data-bs-toggle="modal" data-bs-target="#addEntityModal"
                                        title="Add new entity">
                                    <i class="bi bi-plus-lg"></i>
                                </button>
                            </div>
                            <div class="d-flex flex-wrap gap-2" id="entitiesContainer">
                                <div th:each="entity : ${customEntities}" class="d-inline-flex">
                                    <input type="checkbox" class="btn-check" name="entityIds"
                                           th:id="${'entity_' + entity.id}"
                                           th:value="${entity.id}"
                                           th:checked="${entry.entities.contains(entity)}"
                                           autocomplete="off">
                                    <label class="btn btn-outline-secondary btn-sm"
                                           th:for="${'entity_' + entity.id}"
                                           th:text="${entity.name}"></label>
                                </div>
                                <span th:if="${customEntities.isEmpty()}" class="text-muted small fst-italic">
                                    No entities yet — click <i class="bi bi-plus-lg"></i> to create one.
                                </span>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check2-circle me-1"></i>Save Changes
                            </button>
                            <a th:href="@{/entries/{id}(id=${entry.id})}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<!-- Add Label Modal -->
<div class="modal fade" id="addLabelModal" tabindex="-1" aria-labelledby="addLabelModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title" id="addLabelModalLabel">
                    <i class="bi bi-bookmark-plus me-1"></i>New Custom Label
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control" id="newLabelName"
                       placeholder="Label name..." maxlength="50" autocomplete="off">
                <div class="text-danger small mt-1 d-none" id="labelError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" id="saveLabelBtn">
                    <i class="bi bi-check2 me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Add Entity Modal -->
<div class="modal fade" id="addEntityModal" tabindex="-1" aria-labelledby="addEntityModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h6 class="modal-title" id="addEntityModalLabel">
                    <i class="bi bi-building-add me-1"></i>New Custom Entity
                </h6>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="text" class="form-control" id="newEntityName"
                       placeholder="Entity name..." maxlength="50" autocomplete="off">
                <div class="text-danger small mt-1 d-none" id="entityError"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary btn-sm" id="saveEntityBtn">
                    <i class="bi bi-check2 me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function setupModal({ modalId, inputId, errorId, containerId, saveBtn, endpoint, paramName, checkboxName }) {
        const modal = document.getElementById(modalId);
        const input = document.getElementById(inputId);
        const error = document.getElementById(errorId);
        const container = document.getElementById(containerId);
        const btn = document.getElementById(saveBtn);

        input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
        modal.addEventListener('shown.bs.modal', () => input.focus());
        modal.addEventListener('hidden.bs.modal', () => { input.value = ''; error.classList.add('d-none'); });

        btn.addEventListener('click', function () {
            const name = input.value.trim();
            if (!name) {
                error.textContent = 'Name cannot be empty.';
                error.classList.remove('d-none');
                return;
            }
            btn.disabled = true;
            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: paramName + '=' + encodeURIComponent(name)
            })
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(item => {
                const placeholder = container.querySelector('span.fst-italic');
                if (placeholder) placeholder.remove();
                const div = document.createElement('div');
                div.className = 'd-inline-flex';
                div.innerHTML =
                    `<input type="checkbox" class="btn-check" name="${checkboxName}" id="${checkboxName}_${item.id}" value="${item.id}" autocomplete="off" checked>` +
                    `<label class="btn btn-outline-secondary btn-sm" for="${checkboxName}_${item.id}">${item.name}</label>`;
                container.appendChild(div);
                bootstrap.Modal.getInstance(modal).hide();
            })
            .catch(() => { error.textContent = 'Could not save. Try again.'; error.classList.remove('d-none'); })
            .finally(() => { btn.disabled = false; });
        });
    }

    setupModal({
        modalId: 'addLabelModal', inputId: 'newLabelName', errorId: 'labelError',
        containerId: 'labelsContainer', saveBtn: 'saveLabelBtn',
        endpoint: '/labels/add', paramName: 'name', checkboxName: 'labelIds'
    });

    setupModal({
        modalId: 'addEntityModal', inputId: 'newEntityName', errorId: 'entityError',
        containerId: 'entitiesContainer', saveBtn: 'saveEntityBtn',
        endpoint: '/entities/add', paramName: 'name', checkboxName: 'entityIds'
    });
</script>
</body>
</html>
