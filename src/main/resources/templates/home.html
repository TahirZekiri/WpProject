<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextClassifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 3rem 0;
        }
        .section-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; margin-bottom: 0.5rem; }
        .btn-check:checked + .btn-outline-primary  { background-color: #0d6efd; color: white; }
        .btn-check:checked + .btn-outline-success  { background-color: #198754; color: white; }
        .btn-check:checked + .btn-outline-warning  { background-color: #ffc107; color: #212529; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navigation :: navbar}"></div>

<div class="hero">
    <div class="container text-center">
        <h1 class="display-5 fw-bold mb-2">
            <i class="bi bi-chat-square-text me-2"></i>Text Classifier
        </h1>
        <p class="lead mb-0 opacity-75">Enter your text and label it — type, tone, and format.</p>
    </div>
</div>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Classification Form -->
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-lg-5">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-pencil-square me-2 text-primary"></i>Classify New Text
                    </h5>

                    <form th:action="@{/entries/add}" method="post">

                        <!-- Text content -->
                        <div class="mb-4">
                            <label for="content" class="form-label fw-semibold">Your Text</label>
                            <textarea class="form-control" id="content" name="content" rows="5"
                                      placeholder="Paste or type your text here..." required></textarea>
                        </div>

                        <!-- Text Type -->
                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-tag me-1"></i>What type is this text?
                            </div>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="type : ${textTypes}" class="d-inline-flex">
                                    <input type="radio" class="btn-check" name="textType"
                                           th:id="${'type_' + type.name()}"
                                           th:value="${type.name()}" required autocomplete="off">
                                    <label class="btn btn-outline-primary btn-sm"
                                           th:for="${'type_' + type.name()}"
                                           th:text="${type.displayName}"></label>
                                </div>
                            </div>
                        </div>

                        <!-- Tone -->
                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-emoji-smile me-1"></i>What is the tone?
                            </div>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="tone : ${textTones}" class="d-inline-flex">
                                    <input type="radio" class="btn-check" name="textTone"
                                           th:id="${'tone_' + tone.name()}"
                                           th:value="${tone.name()}" required autocomplete="off">
                                    <label class="btn btn-outline-success btn-sm"
                                           th:for="${'tone_' + tone.name()}"
                                           th:text="${tone.displayName}"></label>
                                </div>
                            </div>
                        </div>

                        <!-- Format -->
                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-file-text me-1"></i>What is the format?
                            </div>
                            <div class="d-flex flex-wrap gap-2">
                                <div th:each="format : ${textFormats}" class="d-inline-flex">
                                    <input type="radio" class="btn-check" name="textFormat"
                                           th:id="${'format_' + format.name()}"
                                           th:value="${format.name()}" required autocomplete="off">
                                    <label class="btn btn-outline-warning btn-sm"
                                           th:for="${'format_' + format.name()}"
                                           th:text="${format.displayName}"></label>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check2-circle me-2"></i>Save Classification
                            </button>
                        </div>

                    </form>
                </div>
            </div>

            <!-- Recent Entries -->
            <div class="mt-5" th:if="${!recentEntries.isEmpty()}">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">
                        <i class="bi bi-clock-history me-2 text-secondary"></i>Recent Entries
                    </h5>
                    <a th:href="@{/entries}" class="btn btn-sm btn-outline-secondary">
                        View All <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
                <div class="list-group shadow-sm">
                    <div th:each="entry : ${recentEntries}"
                         class="list-group-item list-group-item-action py-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="flex-grow-1 me-3 overflow-hidden">
                                <p class="mb-1 text-truncate fw-medium" th:text="${entry.content}"></p>
                                <div class="d-flex flex-wrap gap-1 mt-1">
                                    <span class="badge bg-primary" th:text="${entry.textType.displayName}"></span>
                                    <span class="badge bg-success" th:text="${entry.textTone.displayName}"></span>
                                    <span class="badge bg-warning text-dark" th:text="${entry.textFormat.displayName}"></span>
                                </div>
                            </div>
                            <small class="text-muted text-nowrap"
                                   th:text="${#temporals.format(entry.createdAt, 'dd MMM HH:mm')}"></small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Empty state -->
            <div class="mt-5 text-center py-5 text-muted" th:if="${recentEntries.isEmpty()}">
                <i class="bi bi-inbox display-4 d-block mb-3 opacity-50"></i>
                <p class="mb-0">No entries yet. Classify your first text above!</p>
            </div>

        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
