<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TextClassifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .auth-hero {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            padding: 3rem 0;
        }
        .auth-card { margin-top: -2rem; }
        .section-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6c757d;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
<div class="auth-hero">
    <div class="container text-center">
        <h1 class="display-5 fw-bold mb-2">
            <i class="bi bi-person-plus me-2"></i>Create Account
        </h1>
        <p class="lead mb-0 opacity-75">Join TextClassifier and start building your text collection.</p>
    </div>
</div>

<main class="container auth-card mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-lg-5">
                    <h5 class="card-title mb-4">
                        <i class="bi bi-person-plus-fill me-2 text-primary"></i>Register
                    </h5>

                    <div th:if="${error != null}" class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <div th:text="${error}"></div>
                    </div>

                    <form method="post" th:action="@{/register}">
                        <input type="hidden"
                               th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}">

                        <input type="hidden" name="role" value="ROLE_USER">

                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-person-vcard me-1"></i>Profile
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="name" class="form-label fw-semibold">First Name</label>
                                    <input type="text"
                                           class="form-control"
                                           id="name"
                                           name="name"
                                           placeholder="Name"
                                           th:value="${name}"
                                           autocomplete="given-name"
                                           required>
                                </div>

                                <div class="col-md-6">
                                    <label for="surname" class="form-label fw-semibold">Last Name</label>
                                    <input type="text"
                                           class="form-control"
                                           id="surname"
                                           name="surname"
                                           placeholder="Surname"
                                           th:value="${surname}"
                                           autocomplete="family-name"
                                           required>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="section-label">
                                <i class="bi bi-shield-lock me-1"></i>Credentials
                            </div>
                            <label for="username" class="form-label fw-semibold">Username</label>
                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   placeholder="Choose a username"
                                   th:value="${username}"
                                   autocomplete="username"
                                   required>
                        </div>

                        <div th:if="${passwordMessage != null}"
                             class="alert alert-warning d-flex align-items-center" role="alert">
                            <i class="bi bi-info-circle me-2"></i>
                            <div th:text="${passwordMessage}"></div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="password"
                                       class="form-control"
                                       id="password"
                                       name="password"
                                       placeholder="Password"
                                       autocomplete="new-password"
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                                <input type="password"
                                       class="form-control"
                                       id="confirmPassword"
                                       name="confirmPassword"
                                       placeholder="Confirm password"
                                       autocomplete="new-password"
                                       required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check2-circle me-2"></i>Sign Up
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4 pt-3 border-top">
                        <span class="text-muted">Already have an account?</span>
                        <a th:href="@{/login}" class="fw-semibold text-decoration-none">
                            Login
                            <i class="bi bi-arrow-right ms-1"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
