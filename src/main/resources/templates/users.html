<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users - TextClassifier</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navigation :: navbar}"></div>

<main class="container my-5">

    <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
        <div>
            <h2 class="mb-1 fw-bold">
                <i class="bi bi-people me-2"></i>All Users
            </h2>
            <p class="text-muted mb-0"
               th:text="${page.totalElements + ' user' + (page.totalElements == 1 ? '' : 's') + ' found'}"></p>
        </div>
    </div>

    <!--    Filters-->
    <div class="card shadow-sm border-0 mb-4" th:if="${!page.isEmpty()}">
        <div class="card-body p-4">
            <form method="get" th:action="@{/users}" class="row g-3 align-items-end">
                <input type="hidden" name="pageSize" th:value="${page.size}">

                <div class="col-md-7">
                    <label for="text" class="form-label fw-semibold">Search</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text"
                               class="form-control"
                               id="text"
                               name="text"
                               placeholder="Search by username, name, or surname"
                               th:value="${text}">
                    </div>
                </div>

                <div class="col-md-3">
                    <label for="sortBy" class="form-label fw-semibold">Sort By</label>
                    <select id="sortBy" name="sortBy" class="form-select">
                        <option value="username" th:selected="${sortBy == 'username'}">Username</option>
                        <option value="name" th:selected="${sortBy == 'name'}">Name</option>
                        <option value="surname" th:selected="${sortBy == 'surname'}">Surname</option>
                    </select>
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-funnel me-1"></i>Apply
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${page.isEmpty()}" class="text-center py-5 text-muted">
        <i class="bi bi-people display-3 d-block mb-3 opacity-50"></i>
        <h5>No users found</h5>
        <p class="mb-0">Try another search term or sorting option.</p>
    </div>

    <div th:if="${!page.isEmpty()}" class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Surname</th>
                        <th>Role</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user, stat : ${page.content}">
                        <td class="ps-4 text-muted"
                            th:text="${page.number * page.size + stat.index + 1}"></td>
                        <td>
                            <span class="fw-medium" th:text="${user.username}"></span>
                        </td>
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.surname}"></td>
                        <td>
                            <span class="badge bg-secondary" th:text="${user.role}"></span>
                        </td>
                        <td class="text-end pe-4">
                            <form th:action="@{/users/delete/{username}(username=${user.username})}"
                                  method="post"
                                  class="d-inline">
                                <input type="hidden"
                                       th:if="${_csrf != null}"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash me-1"></i>Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="mt-4" th:if="${!page.isEmpty()}">
        <div th:include="fragments/paging :: pageSection(${page})"></div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
